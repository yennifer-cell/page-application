
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordly Dictionary</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Wordly 📚</h1>
      <p class="subtitle">Search a word, get definitions, synonyms, and pronunciation - no page reload.</p>

      <div class="header-actions">
        <button id="themeToggle" type="button" class="btn btn-secondary" aria-label="Toggle theme">
          <svg id="themeIcon" class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
          Toggle theme
        </button>
      </div>
    </header>

    <section class="card">
      <form id="searchForm" class="search" aria-label="Dictionary search form">
        <label class="sr-only" for="wordInput">Search for a word</label>
        <input
          id="wordInput"
          name="word"
          type="text"
          placeholder="Type a word (e.g., resilience)"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          Search
        </button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>
      <p id="error" class="error" role="alert" aria-live="assertive"></p>
    </section>

    <section class="grid">
      <section class="card results" aria-label="Search results">
        <div class="results-header">
          <div>
            <h2 id="resultWord" class="result-word">Search something 👀</h2>
            <p id="resultPhonetic" class="result-phonetic"></p>
          </div>

          <div class="results-actions">
            <button id="playAudio" type="button" class="btn btn-secondary" disabled>
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              </svg>
              Play audio
            </button>
            <button id="saveWord" type="button" class="btn btn-secondary" disabled>
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              Save word
            </button>
          </div>
        </div>

        <audio id="audio" preload="none"></audio>

        <div id="resultBody" class="result-body">
          <p class="hint">Your definitions will show here.</p>
        </div>
      </section>

      <aside class="card saved" aria-label="Saved words">
        <h3>
          <svg style="display: inline-block; vertical-align: middle; margin-right: 4px;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          Saved words
        </h3>
        <ul id="savedList" class="saved-list"></ul>
        <button id="clearSaved" type="button" class="btn btn-danger">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"></path>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
          </svg>
          Clear saved
        </button>
      </aside>
    </section>

    <footer class="footer">
      <small>Powered by <a href="https://dictionaryapi.dev/" target="_blank" rel="noopener noreferrer">Free Dictionary API</a>.</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
